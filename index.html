<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>希田智农 · 起始页 (CSP安全版)</title>
    <!-- 完全保留原有的高级视觉，移除所有内联事件，符合CSP安全策略 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 高级感的蓝灰背景 —— 微妙渐变 + 极淡噪点质感 */
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 40%, #2c3a4b 0%, #1c262f 100%);
            /* 增加极其细微的噪点纹理，提升深度 */
            position: relative;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            font-weight: 400;
            color: #eef3f9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 柔和的光晕效果，模拟空气感 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 — 半透明磨砂玻璃质感，非常克制的边框与阴影 */
        .start-panel {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            width: 100%;
            background: rgba(18, 26, 34, 0.45);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(210, 225, 245, 0.08);
            border-radius: 2.5rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
        }

        /* 两栏布局，左侧稍宽用于核心功能，右侧放置快速笔记/待办 */
        .grid-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2.2rem;
            align-items: start;
        }

        /* ----- 左侧区域 (搜索 + 常用链接) ----- */
        .left-zone {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* 极简搜索条 — 低调但清晰可见 */
        .search-area {
            width: 100%;
        }

        .search-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a3b9d1;
            margin-bottom: 0.6rem;
            font-weight: 300;
            opacity: 0.7;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: rgba(8, 18, 28, 0.5);
            border-radius: 3rem;
            border: 1px solid rgba(170, 200, 240, 0.1);
            padding: 0.1rem 0.1rem 0.1rem 1.5rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .search-wrapper:focus-within {
            border-color: rgba(150, 190, 240, 0.25);
            box-shadow: 0 0 0 1px rgba(150, 190, 240, 0.15);
            background: rgba(10, 22, 34, 0.6);
        }

        .search-icon {
            color: #b7c9e0;
            font-size: 1rem;
            margin-right: 0.5rem;
            opacity: 0.5;
            cursor: pointer;
        }

        .search-input {
            background: transparent;
            border: none;
            padding: 1rem 0.8rem 1rem 0;
            font-size: 1rem;
            color: #eef5fc;
            width: 100%;
            outline: none;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .search-input::placeholder {
            color: #98aec7;
            font-weight: 300;
            font-size: 0.9rem;
            opacity: 0.5;
        }

        .search-shortcut {
            background: rgba(60, 80, 105, 0.3);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            color: #cbdaea;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-right: 0.8rem;
            letter-spacing: 0.5px;
            font-weight: 300;
            cursor: pointer;
        }

        /* 快速链接区块 — 网格形式 */
        .quick-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-mini-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #b4cae3;
            font-weight: 300;
            opacity: 0.65;
            margin-bottom: 0.3rem;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
        }

        .link-item {
            background: rgba(25, 38, 50, 0.5);
            border: 1px solid rgba(210, 230, 255, 0.05);
            border-radius: 1.8rem;
            padding: 0.9rem 0.2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #d1e0f2;
            text-decoration: none;
            font-weight: 300;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            transition: background 0.2s, border 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            cursor: pointer;
        }

        .link-item:hover {
            background: rgba(45, 65, 85, 0.6);
            border-color: rgba(200, 225, 255, 0.15);
            color: #f0f7ff;
            transform: scale(1.01);
        }

        .link-icon {
            font-size: 1.1rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        /* 右侧卡片样式 (笔记 + 代办) */
        .right-zone {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background: rgba(18, 28, 38, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(200, 220, 250, 0.06);
            border-radius: 2rem;
            padding: 1.6rem 1.5rem;
            box-shadow: 0 20px 30px -20px #03080e;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.4rem;
        }

        .card-header h3 {
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #bacde0;
            opacity: 0.8;
        }

        .card-header span {
            color: #7e9bb9;
            font-size: 0.8rem;
            background: rgba(70, 100, 130, 0.2);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        /* 笔记列表 */
        .note-item {
            padding: 0.6rem 0 0.6rem 0.5rem;
            border-bottom: 1px solid rgba(170, 200, 240, 0.06);
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-weight: 300;
            font-size: 0.9rem;
            color: #d1e2f5;
            transition: 0.1s;
        }
        .note-item[draggable="true"]:hover {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            cursor: grab;
        }

        .note-item:last-child {
            border-bottom: none;
        }

        .note-bullet {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 10px;
            background: #8ba9cc;
            opacity: 0.5;
        }

        .note-text {
            flex: 1;
        }

        .note-time {
            font-size: 0.65rem;
            color: #8199b5;
            letter-spacing: 0.2px;
        }

        /* 代办事项 */
        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed rgba(160, 190, 230, 0.08);
            cursor: pointer;
        }

        .todo-item:last-child {
            border-bottom: none;
        }

        .todo-check {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1.5px solid #7089aa;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            font-size: 0.7rem;
            transition: 0.1s;
            cursor: pointer;
        }

        .todo-check.checked {
            background: #8fb1d6;
            border-color: #8fb1d6;
            color: #0f1c2c;
        }

        .todo-text {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 300;
            color: #d3e4fc;
            transition: 0.2s;
            cursor: text; /* 暗示可编辑 */
        }
        .todo-text.dim {
            opacity: 0.4;
            text-decoration: line-through;
        }

        /* 占位 / 水印极简装饰 */
        .meta-footer {
            margin-top: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #577494;
            letter-spacing: 0.6px;
            border-top: 1px solid rgba(130, 170, 220, 0.08);
            padding-top: 1.5rem;
            font-weight: 300;
        }

        .meta-footer .date {
            color: #a2bbd6;
        }

        .meta-footer .greeting {
            text-transform: uppercase;
        }

        /* 响应式微调 */
        @media (max-width: 720px) {
            .grid-layout {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .start-panel {
                padding: 2rem 1.5rem;
            }
            .link-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 一些装饰用的小点 (极简) */
        .dot-decoration {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #a5bedb;
            opacity: 0.3;
        }

        /* 极简搜索选择器，完全融入设计，不破坏美感 */
        .engine-selector {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            margin-left: 0.3rem;
        }
        .engine-dot {
            width: 24px;
            height: 24px;
            border-radius: 40px;
            background: rgba(30, 45, 60, 0.6);
            backdrop-filter: blur(3px);
            border: 1px solid rgba(210, 230, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #b0c9e5;
            cursor: pointer;
            transition: 0.15s;
        }
        .engine-dot:hover, .engine-dot.active {
            background: rgba(60, 90, 125, 0.7);
            border-color: rgba(210, 235, 255, 0.3);
            color: white;
        }
        /* 隐藏双击提示，只在需要时显示 */
        .hint-tip {
            font-size: 0.7rem;
            color: #5f7b9a;
            margin-left: 1rem;
            opacity: 0.5;
            letter-spacing: 0.3px;
        }
        
        .company-text {
            color: #a2bbd6;
            opacity: 0.6;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="start-panel">
        <!-- 两栏核心区域 -->
        <div class="grid-layout">
            <!-- 左侧：搜索 + 常用链接 -->
            <div class="left-zone">
                <!-- 搜索模块 (功能完全实现) -->
                <div class="search-area">
                    <span class="search-label">⌕ 探索 · 即刻开始</span>
                    <div class="search-wrapper">
                        <span class="search-icon" id="searchIcon" title="使用当前搜索引擎">🔍</span>
                        <input class="search-input" id="searchInput" type="text" placeholder="搜索或输入网址..." autofocus>
                        <span class="search-shortcut" id="searchBtn">↵</span>
                    </div>
                    <!-- 搜索引擎选择器 - 完全融入设计，不破坏原有美感 -->
                    <div class="engine-selector">
                        <span class="engine-dot" data-engine="github" title="GitHub">GH</span>
                        <span class="engine-dot" data-engine="yandex" title="Yandex">Ya</span>
                        <span class="engine-dot" data-engine="baidu" title="百度">Ba</span>
                        <span class="engine-dot" data-engine="bing" title="Bing">Bi</span>
                        <span class="hint-tip">双击链接可复制 · 直接输入智能跳转</span>
                    </div>
                </div>

                <!-- 常用链接 (高级感网格) -->
                <div class="quick-links">
                    <div class="section-mini-title">✦ 精选集</div>
                    <div class="link-grid" id="linkGrid">
                        <a href="#" class="link-item" data-url="https://github.com" data-name="GitHub"><span class="link-icon">⌨️</span> GitHub</a>
                        <a href="#" class="link-item" data-url="https://yandex.com" data-name="Yandex"><span class="link-icon">🌐</span> Yandex</a>
                        <a href="#" class="link-item" data-url="https://www.baidu.com" data-name="百度"><span class="link-icon">🔍</span> 百度</a>
                        <a href="#" class="link-item" data-url="https://www.bing.com" data-name="必应"><span class="link-icon">🧊</span> 必应</a>
                        <a href="#" class="link-item" data-url="https://mail.google.com" data-name="Gmail"><span class="link-icon">📬</span> 邮箱</a>
                        <a href="#" class="link-item" data-url="https://feedly.com" data-name="Feedly"><span class="link-icon">📰</span> 阅读</a>
                        <a href="#" class="link-item" data-url="https://open.spotify.com" data-name="Spotify"><span class="link-icon">🎵</span> 声波</a>
                        <a href="#" class="link-item" data-url="https://drive.google.com" data-name="Drive"><span class="link-icon">📁</span> 文档</a>
                    </div>
                    <!-- 第二组更抽象占位，增加层次 -->
                    <div style="display: flex; gap: 0.8rem; margin-top: 0.2rem; opacity:0.7;">
                        <span style="font-size:0.7rem; color:#8fa9c4;">设计系统</span>
                        <span style="font-size:0.7rem; color:#8fa9c4;">· 资源库</span>
                        <span style="font-size:0.7rem; color:#8fa9c4;">· 暗调</span>
                    </div>
                </div>
            </div>

            <!-- 右侧：卡片功能区（笔记 + 待办） -->
            <div class="right-zone">
                <!-- 快速笔记卡片 -->
                <div class="card" id="notesCard">
                    <div class="card-header">
                        <h3>📋 速记 <span style="cursor:pointer;" id="addNoteBtn" title="新增笔记">+</span></h3>
                        <span id="noteCount">3条</span>
                    </div>
                    <div id="noteList">
                        <div class="note-item" draggable="false">
                            <span class="note-bullet"></span>
                            <span class="note-text" contenteditable="true" spellcheck="false">蓝灰色调 亚麻质感</span>
                            <span class="note-time">09:45</span>
                        </div>
                        <div class="note-item" draggable="false">
                            <span class="note-bullet"></span>
                            <span class="note-text" contenteditable="true" spellcheck="false">起始页 交互第一版</span>
                            <span class="note-time">昨</span>
                        </div>
                        <div class="note-item" draggable="false">
                            <span class="note-bullet"></span>
                            <span class="note-text" contenteditable="true" spellcheck="false">增加模糊玻璃效果</span>
                            <span class="note-time">15:22</span>
                        </div>
                    </div>
                    <!-- 占位符输入区域 — 极简 (点击新增) -->
                    <div style="margin-top: 1rem; display: flex; gap:0.5rem; align-items:center; opacity:0.5; cursor:pointer;" id="quickAddNote">
                        <span style="font-size:1.2rem;">✏️</span>
                        <span style="font-size:0.75rem; border-bottom:1px dashed #557c9f; width:100%; padding-bottom:2px;">写下新想法...</span>
                    </div>
                </div>

                <!-- 待办清单卡片 (已按需求修改：支持双击修改名称，存储键名 dsspseek) -->
                <div class="card" id="todoCard">
                    <div class="card-header">
                        <h3>✓ 待办 <span style="cursor:pointer;" id="addTodoBtn" title="新增待办">+</span></h3>
                        <span id="todoCount">2/5</span>
                    </div>
                    <div id="todoList">
                        <div class="todo-item" data-checked="true">
                            <span class="todo-check checked">✓</span>
                            <span class="todo-text dim">初稿沟通</span>
                        </div>
                        <div class="todo-item" data-checked="false">
                            <span class="todo-check"></span>
                            <span class="todo-text">确定背景质感</span>
                        </div>
                        <div class="todo-item" data-checked="false">
                            <span class="todo-check"></span>
                            <span class="todo-text">预设八个常用链接</span>
                        </div>
                        <div class="todo-item" data-checked="false">
                            <span class="todo-check"></span>
                            <span class="todo-text">添加日期与问候</span>
                        </div>
                        <div class="todo-item" data-checked="true">
                            <span class="todo-check checked">✓</span>
                            <span class="todo-text dim">模糊实验</span>
                        </div>
                    </div>
                </div>

                <!-- 极简装饰 -->
                <div style="display: flex; justify-content: flex-end; gap: 15px; opacity:0.3; font-size:0.6rem; letter-spacing:1px;">
                    <span>● 此刻温柔</span>
                    <span>● 23°C</span>
                </div>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="meta-footer">
            <p class="company-text">希田智慧农业科技有限公司</p>
            <span class="greeting" id="greetingMsg">☾ 深夜适合思考</span>
            <span class="date" id="currentDate">2025 · 02 · 25</span>
        </div>
    </div>

    <!-- 浮动的微光 -->
    <div style="position: fixed; bottom:0; left:0; width:100%; height:100px; background: radial-gradient(ellipse at 50% 100%, rgba(100,140,200,0.03), transparent 70%); pointer-events: none; z-index:1;"></div>

    <script>
        (function() {
            // --- 完全保留视觉，功能增强，无任何内联事件，符合CSP安全策略 ---
            // 存储键名改为 dsspseek (原先是 vibe_todos)
            const STORAGE_TODOS = 'dsspseek';   // ✅ 按需求修改

            // ---- 日期&问候动态更新 ----
            function updateDateTime() {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                document.getElementById('currentDate').innerText = `${year} · ${month} · ${day}`;
                
                const hour = now.getHours();
                let greeting = '';
                if (hour < 6) greeting = '☾ 深夜适合思考';
                else if (hour < 12) greeting = '☀️ 上午好';
                else if (hour < 18) greeting = '⛅ 下午好';
                else greeting = '☾ 夜晚宁静';
                document.getElementById('greetingMsg').innerText = greeting;
            }
            updateDateTime();

            // ---- 搜索引擎切换 ----
            let currentEngine = 'google';
            const engineDots = document.querySelectorAll('.engine-dot');
            const searchIcon = document.getElementById('searchIcon');
            const engineMap = {
                google: { name: 'G', url: 'https://www.google.com/search?q=' },
                github: { name: 'GH', url: 'https://github.com/search?q=' },
                yandex: { name: 'Ya', url: 'https://yandex.com/search/?text=' },
                baidu: { name: 'Ba', url: 'https://www.baidu.com/s?wd=' },
                bing: { name: 'Bi', url: 'https://www.bing.com/search?q=' }
            };
            
            // 默认激活第一个（GitHub）
            if (engineDots.length > 0) {
                engineDots[0].classList.add('active');
                currentEngine = engineDots[0].dataset.engine;
                searchIcon.innerText = engineDots[0].innerText + '⚲';
            }
            
            engineDots.forEach(dot => {
                dot.addEventListener('click', function() {
                    engineDots.forEach(d => d.classList.remove('active'));
                    this.classList.add('active');
                    currentEngine = this.dataset.engine;
                    searchIcon.innerText = this.innerText + '⚲';
                });
            });

            // ---- 搜索功能 (回车/按钮) ----
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');

            function performSearch() {
                let query = searchInput.value.trim();
                if (!query) return;
                
                // 智能识别：如果包含.且不含空格，当作网址处理
                const hasSpace = query.includes(' ');
                const hasDot = query.includes('.');
                const seemsLikeUrl = hasDot && !hasSpace && !query.startsWith('http');
                
                if (seemsLikeUrl) {
                    if (!query.startsWith('http://') && !query.startsWith('https://')) {
                        query = 'https://' + query;
                    }
                    window.open(query, '_blank');
                } else {
                    // 使用当前搜索引擎
                    const baseUrl = engineMap[currentEngine]?.url || engineMap.google.url;
                    window.open(baseUrl + encodeURIComponent(query), '_blank');
                }
                searchInput.value = ''; // 可选清空
            }

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });
            searchBtn.addEventListener('click', performSearch);

            // ---- 链接单击/双击处理 ----
            document.querySelectorAll('.link-item').forEach(link => {
                // 单击：新窗口打开链接
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const url = link.dataset.url;
                    if (url) window.open(url, '_blank');
                });
                
                // 双击：复制链接地址
                link.addEventListener('dblclick', (e) => {
                    e.preventDefault();
                    const url = link.dataset.url;
                    if (url) {
                        navigator.clipboard.writeText(url).then(() => {
                            const originalText = link.innerText;
                            link.innerText = '✓ 已复制';
                            setTimeout(() => {
                                link.innerText = originalText;
                            }, 600);
                        }).catch(() => {
                            alert('复制失败，请手动复制: ' + url);
                        });
                    }
                });
            });

            // ---- 笔记功能 (保持不变) ----
            const noteList = document.getElementById('noteList');
            const noteCountSpan = document.getElementById('noteCount');
            
            function updateNoteCount() {
                const count = noteList.children.length;
                noteCountSpan.innerText = count + '条';
            }

            // 新增笔记
            function addNewNote(text = '新想法', time = '刚刚') {
                const newNote = document.createElement('div');
                newNote.className = 'note-item';
                newNote.setAttribute('draggable', 'false');
                newNote.innerHTML = `
                    <span class="note-bullet"></span>
                    <span class="note-text" contenteditable="true" spellcheck="false">${text}</span>
                    <span class="note-time">${time}</span>
                `;
                noteList.appendChild(newNote);
                updateNoteCount();
            }

            document.getElementById('addNoteBtn').addEventListener('click', () => {
                addNewNote('双击可编辑', '此刻');
            });
            document.getElementById('quickAddNote').addEventListener('click', () => {
                addNewNote('新笔记', '现在');
            });

            // 双击笔记删除（按住文字可编辑，双击空白删除）
            noteList.addEventListener('dblclick', (e) => {
                const noteItem = e.target.closest('.note-item');
                if (noteItem && !e.target.classList.contains('note-text')) {
                    if (confirm('删除这条笔记？')) {
                        noteItem.remove();
                        updateNoteCount();
                    }
                }
            });

            // ---- 待办功能 (已修改：支持双击修改名称，存储键名 dsspseek) ----
            const todoList = document.getElementById('todoList');
            const todoCountSpan = document.getElementById('todoCount');
            
            function updateTodoCount() {
                const todos = document.querySelectorAll('.todo-item');
                const total = todos.length;
                const checked = document.querySelectorAll('.todo-item[data-checked="true"]').length;
                todoCountSpan.innerText = `${checked}/${total}`;
            }

            // 切换待办状态
            function toggleTodo(checkElement) {
                const todoItem = checkElement.closest('.todo-item');
                const textSpan = todoItem.querySelector('.todo-text');
                const isChecked = checkElement.classList.contains('checked');
                
                if (isChecked) {
                    checkElement.classList.remove('checked');
                    checkElement.innerText = '';
                    textSpan.classList.remove('dim');
                    todoItem.dataset.checked = 'false';
                } else {
                    checkElement.classList.add('checked');
                    checkElement.innerText = '✓';
                    textSpan.classList.add('dim');
                    todoItem.dataset.checked = 'true';
                }
                updateTodoCount();
                saveAllData(); // 修改后保存
            }

            // 删除待办
            function deleteTodoItem(todoItem) {
                if (todoItem && confirm('删除待办？')) {
                    todoItem.remove();
                    updateTodoCount();
                    saveAllData();
                }
            }

            // 修改待办名称 (双击文字进入编辑)
            function makeTodoTextEditable(textSpan) {
                // 如果已经存在编辑框则不再重复创建
                if (textSpan.querySelector('input')) return;

                const currentText = textSpan.innerText;
                const input = document.createElement('input');
                input.type = 'text';
                input.value = currentText;
                input.style.background = 'rgba(20,35,50,0.8)';
                input.style.border = '1px solid #5f7b9a';
                input.style.color = '#eef3f9';
                input.style.fontSize = '0.9rem';
                input.style.fontWeight = '300';
                input.style.padding = '0.2rem 0.4rem';
                input.style.borderRadius = '12px';
                input.style.width = '100%';
                input.style.outline = 'none';

                textSpan.innerText = ''; // 清空原文本
                textSpan.appendChild(input);
                input.focus();

                function finishEditing(keepFocus = false) {
                    const newText = input.value.trim() || currentText;
                    // 移除input，恢复span文字
                    textSpan.innerText = newText;
                    if (!keepFocus) {
                        textSpan.blur(); // 只是移除焦点感
                    }
                    saveAllData(); // 修改后保存
                }

                input.addEventListener('blur', () => finishEditing(false));
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        finishEditing(false);
                    }
                });
            }

            // 为所有待办添加事件监听
            function attachTodoEvents(todoItem) {
                const checkBox = todoItem.querySelector('.todo-check');
                const textSpan = todoItem.querySelector('.todo-text');
                
                // 点击复选框切换状态
                checkBox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleTodo(checkBox);
                });
                
                // 双击文字修改待办名称 (新功能)
                textSpan.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    makeTodoTextEditable(textSpan);
                });

                // 保留之前双击删除？不，原先是双击删除，但需求改为“支持修改名称”，所以我们移除删除的双击，用单击复选框/单独删除按钮？
                // 但原设计中并没有删除按钮，但保留了双击笔记删除。为了不丢失删除功能，我们可以另外加一个右键或长按？但为了最小改动，我们保留复选框旁边的双击删除逻辑？冲突。
                // 根据需求“添加待办是支持修改名称”，必须保留修改名称，但也要有删除方式。可以用右键或单独的删除手势？但是为了不破坏原设计感觉，我决定：保留双击文字修改，同时使用【双击待办空白区域/或双击todo-item本身删除】？
                // 但原文件是“双击文字删除待办”，现在改为双击文字修改名称，删除能力没了。为了保留删除能力，我改为：单击复选框切换状态，双击文字修改名称，如果需要删除，可以增加一个不太显眼的双击整个item空白处（除文字外）？
                // 但为了尽量减少对原有习惯的改动，且确保删除功能可用，我添加一个长按或右键？不够直观。可以简单增加一个按钮？但设计上要保持极简。
                // 折中：单击复选框切换，双击文字修改名称，如果想删除，可以双击todo-item右侧空白(但很难点)，或者我们加一个极小隐藏删除? 
                // 最简单的：保留之前的双击删除能力，但冲突了。重新分配：双击文字是修改，双击复选框区域（包括左侧）切换状态？但双击复选框会触发两次。
                // 我用一个稳妥方案：保持双击整个待办条目（除了文字部分）删除，但需要精确判断。修改如下:
            }

            // 附加：双击待办条目(不是文字部分)删除待办
            todoList.addEventListener('dblclick', (e) => {
                const todoItem = e.target.closest('.todo-item');
                if (!todoItem) return;
                // 如果双击的是todo-text或其内部(input)，则已经由文字的双击处理了，这里不处理
                if (e.target.classList.contains('todo-text') || e.target.closest('.todo-text')) {
                    // 由文字的双击处理修改，此处不拦截，但注意避免两次触发 (我们已经在attachTodoEvents里添加了文字双击，这里会先触发那个)
                    // 为防止同时触发，需要文字双击里stopPropagation
                    return;
                }
                // 否则双击的是空白区域或复选框区域 -> 删除
                e.preventDefault();
                e.stopPropagation();
                deleteTodoItem(todoItem);
            });

            // 为现有待办添加事件，并确保文字双击停止传播
            function attachAllTodos() {
                document.querySelectorAll('#todoList .todo-item').forEach(item => {
                    // 避免重复绑定
                    if (item.dataset.eventsAttached === 'yes') return;
                    const textSpan = item.querySelector('.todo-text');
                    const checkBox = item.querySelector('.todo-check');
                    
                    checkBox.replaceWith(checkBox.cloneNode(true)); // 移除旧监听重新绑定避免重复
                    textSpan.replaceWith(textSpan.cloneNode(true));
                    
                    const newCheck = item.querySelector('.todo-check');
                    const newText = item.querySelector('.todo-text');
                    
                    // 重新获取
                    newCheck.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleTodo(newCheck);
                    });
                    
                    newText.addEventListener('dblclick', (e) => {
                        e.stopPropagation();  // 阻止冒泡到todoList的双击删除
                        makeTodoTextEditable(newText);
                    });
                    
                    item.dataset.eventsAttached = 'yes';
                });
            }

            // 新增待办 (确保事件绑定)
            document.getElementById('addTodoBtn').addEventListener('click', () => {
                const newItem = document.createElement('div');
                newItem.className = 'todo-item';
                newItem.setAttribute('data-checked', 'false');
                newItem.innerHTML = `
                    <span class="todo-check"></span>
                    <span class="todo-text">新任务</span>
                `;
                todoList.appendChild(newItem);
                attachAllTodos(); // 给新项绑定事件
                updateTodoCount();
                saveAllData();
            });

            // 初始化绑定所有待办
            attachAllTodos();
            updateTodoCount();

            // ---- 自动保存到localStorage (存储键名修改为 dsspseek) ----
            function saveAllData() {
                // 保存笔记 (笔记键名不变，保持原有，但也可不动)
                const notes = [];
                document.querySelectorAll('#noteList .note-item').forEach(item => {
                    const text = item.querySelector('.note-text')?.innerText || '';
                    const time = item.querySelector('.note-time')?.innerText || '';
                    notes.push({ text, time });
                });
                localStorage.setItem('vibe_notes', JSON.stringify(notes));
                
                // 保存待办 —— 使用新键名 dsspseek
                const todos = [];
                document.querySelectorAll('#todoList .todo-item').forEach(item => {
                    const text = item.querySelector('.todo-text')?.innerText || '';
                    const checked = item.dataset.checked === 'true';
                    todos.push({ text, checked });
                });
                localStorage.setItem(STORAGE_TODOS, JSON.stringify(todos));
            }

            // 自动保存（每次修改后）
            noteList.addEventListener('input', saveAllData);
            todoList.addEventListener('click', () => setTimeout(saveAllData, 50));
            todoList.addEventListener('dblclick', () => setTimeout(saveAllData, 50));
            
            // 可选加载保存的数据（为了演示，这里不自动加载以免覆盖示例，可手动解除注释）
            // 但符合要求：其他代码不动，所以保留示例数据，不加载存储。

        })();
    </script>
</body>
</html>
